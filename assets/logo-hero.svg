<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 190">
  <!-- Белая плашка (без синего фона) -->
  <rect x="10" y="8" width="186" height="174" rx="14" fill="#FFFFFF"/>

  <!-- Самовар — чёрный силуэт -->
  <g transform="translate(40,18) scale(0.93)" fill="#111111">
    <!-- Крышечка-кнопка -->
    <circle cx="65" cy="3" r="3.5"/>
    <!-- Крышка чайника -->
    <ellipse cx="65" cy="9" rx="17" ry="5.5"/>
    <!-- Тело чайника -->
    <path d="M47 10 h36 a5 5 0 0 1 5 5 v7 a5 5 0 0 1-5 5 H47 a5 5 0 0 1-5-5 v-7 a5 5 0 0 1 5-5z"/>
    <!-- Ручка чайника (правая) -->
    <path d="M88 13 q16 0 16 8 q0 9-16 9" stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Носик чайника (левый) -->
    <path d="M42 15 q-14 1-13 8 q1 5 10 6" stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Шейка/коннектор -->
    <rect x="57" y="27" width="16" height="10" rx="2"/>
    <!-- Верхнее кольцо корпуса -->
    <rect x="27" y="37" width="76" height="7" rx="2"/>
    <!-- Тело самовара -->
    <path d="M20 44 h90 a7 7 0 0 1 7 7 v38 a7 7 0 0 1-7 7 H20 a7 7 0 0 1-7-7 V51 a7 7 0 0 1 7-7z"/>
    <!-- 5 кружочков на теле -->
    <circle cx="34" cy="65" r="4.8"/>
    <circle cx="49" cy="65" r="4.8"/>
    <circle cx="65" cy="65" r="4.8"/>
    <circle cx="81" cy="65" r="4.8"/>
    <circle cx="96" cy="65" r="4.8"/>
    <!-- Левая ручка -->
    <path d="M13 54 q-18 7-18 16 q0 9 18 16" stroke="#111" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Правая ручка -->
    <path d="M117 54 q18 7 18 16 q0 9-18 16" stroke="#111" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Нижнее кольцо -->
    <rect x="27" y="96" width="76" height="7" rx="2"/>
    <!-- Кран -->
    <rect x="56" y="103" width="18" height="7" rx="2"/>
    <rect x="59" y="109" width="12" height="7" rx="2"/>
    <!-- Основание -->
    <path d="M34 116 h62 l-7 18 H41 z"/>
    <!-- Чашка (правая нижняя) -->
    <path d="M85 132 h34 a3 3 0 0 1 3 3 v13 a3 3 0 0 1-3 3 H85 a3 3 0 0 1-3-3 v-13 a3 3 0 0 1 3-3z"/>
    <!-- Ручка чашки -->
    <path d="M119 136 q12 2 12 8 q0 6-12 8" stroke="#111" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Блюдце -->
    <ellipse cx="102" cy="151" rx="24" ry="5.5"/>
    <!-- Линия капли от крана к чашке -->
    <path d="M65 110 q-4 16 12 22 q12 5 26 0" stroke="#111" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Текст: ВАШ (жёлтый) и ОТДЫХ (белый с тёмным контуром) -->
  <text x="222" y="95"
    font-family="-apple-system,'Segoe UI','Arial Black',Arial,sans-serif"
    font-size="64" font-weight="800" fill="#F5C518">ВАШ</text>
  <text x="222" y="154"
    font-family="-apple-system,'Segoe UI','Arial Black',Arial,sans-serif"
    font-size="46" font-weight="800"
    fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" paint-order="stroke fill">ОТДЫХ</text>

  <!-- Жёлтая скобка ] справа -->
  <line x1="490" y1="34" x2="490" y2="156" stroke="#F5C518" stroke-width="8" stroke-linecap="round"/>
  <line x1="490" y1="34" x2="508" y2="34"  stroke="#F5C518" stroke-width="8" stroke-linecap="round"/>
  <line x1="490" y1="156" x2="508" y2="156" stroke="#F5C518" stroke-width="8" stroke-linecap="round"/>
</svg>
